e));}return FONTS.map((f,i)=>({...f,_i:i}));}let fontBuildTimeout;function buildFonts(){clearTimeout(fontBuildTimeout);fontBuildTimeout=setTimeout(()=>{const list = document.getElementById('fontList');list.innerHTML = '';const visible = getVisibleFonts();const src = rawText || document.getElementById('txt').value.trim();const hasCyr = isCyrillic(src);if(!hasCyr && src){const info = document.createElement('div');info.style.cssText='margin-bottom:10px;padding:8px 10px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);border-radius:10px;font-size:9px;color:rgba(99,179,237,.6);letter-spacing:.05em;line-height:1.5';info.textContent='Нажми на карточку — шрифт применится к тексту';list.appendChild(info);}const grid = document.createElement('div'); grid.className = 'font-grid';visible.forEach(f => {const i = f._i;const card = document.createElement('div');card.className = 'font-card' + (lastAppliedIdx === i ? ' applied' : '');card.dataset.idx = i;const nm = document.createElement('div'); nm.className = 'font-card-name'; nm.textContent = f.name;const pv = document.createElement('div'); pv.className = 'font-card-preview';pv.textContent = tryFont(f.fn, 'Sample Text');const uv = document.createElement('div'); uv.className = 'font-card-user';uv.textContent = src ? tryFont(f.fn, src) : '';const ap = document.createElement('div'); ap.className = 'font-card-apply';ap.textContent = lastAppliedIdx === i ? '✓ применён' : 'применить';card.appendChild(nm); card.appendChild(pv); card.appendChild(uv); card.appendChild(ap);card.onclick = () => applyFont(f.fn, i);grid.appendChild(card);});list.appendChild(grid);},50);}function updateFontPreviews(){if(currentSheet !== 'fonts') return;buildFonts();}function tryFont(fn,s){ try{ return fn(s); }catch(e){ return s; } }function applyFont(fn, idx){const ta = document.getElementById('txt');const source = rawText || ta.value;const s = ta.selectionStart, e = ta.selectionEnd;let converted;if(s !== e){const sel = ta.value.slice(s, e);converted = tryFont(fn, sel);ta.value = ta.value.slice(0, s) + converted + ta.value.slice(e);ta.selectionStart = s; ta.selectionEnd = s + converted.length;} else {converted = tryFont(fn, source);ta.value = converted;}lastAppliedIdx = idx;ta.focus();gen();document.querySelectorAll('.font-card').forEach((card) => {const ci = parseInt(card.dataset.idx);const isApplied = ci === idx;card.classList.toggle('applied', isApplied);const ap = card.querySelector('.font-card-apply');if(ap) ap.textContent = isApplied ? '✓ применён' : 'применить';const uv = card.querySelector('.font-card-user');const f = FONTS[ci];if(uv && f) uv.textContent = source ? tryFont(f.fn, source) : '';});toast('✓  ' + FONTS[idx].name + ' применён');}let currentSheet=null;function openSheet(which){const sheetId=which==='fonts'?'sheetFonts':'sheetSyms';const tabId=which==='fonts'?'tabFonts':'tabSyms';if(currentSheet===which){closeSheet();return}if(which==='fonts')buildFonts();else if(which==='syms')buildSyms();if(currentSheet){document.getElementById(currentSheet==='fonts'?'sheetFonts':'sheetSyms').classList.remove('open');document.getElementById(currentSheet==='fonts'?'tabFonts':'tabSyms').classList.remove('active');}currentSheet=which;document.getElementById(sheetId).classList.add('open');document.getElementById(tabId).classList.add('active');document.getElementById('overlay').classList.add('show');}function closeSheet(){if(!currentSheet)return;document.getElementById(currentSheet==='fonts'?'sheetFonts':'sheetSyms').classList.remove('open');document.getElementById(currentSheet==='fonts'?'tabFonts':'tabSyms').classList.remove('active');document.getElementById('overlay').classList.remove('show');currentSheet=null;}function copyCode(){const t=document.getElementById('code').textContent;if(t==='—'){toast('// сначала введи текст');return}navigator.clipboard.writeText(t).then(()=>toast('✓ код скопирован')).catch(()=>{const e=document.createElement('textarea');e.value=t;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);toast('✓ код скопирован');});}function toast(msg){let t=document.getElementById('_toast');if(!t){t=document.createElement('div');t.id='_toast';Object.assign(t.style,{position:'fixed',bottom:'82px',left:'50%',transform:'translateX(-50%) translateY(14px)',background:'linear-gradient(135deg,#2563eb,#4f46e5)',color:'#fff',padding:'10px 22px',borderRadius:'100px',fontSize:'10px',fontFamily:"'Space Mono',monospace",fontWeight:'700',letterSpacing:'.1em',textTransform:'uppercase',opacity:'0',pointerEvents:'none',transition:'all .3s cubic-bezier(.16,1,.3,1)',zIndex:'200',whiteSpace:'nowrap',boxShadow:'0 6px 24px rgba(37,99,235,.5)'});document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(14px)'},1800);}pick(0);document.getElementById('symList').addEventListener('click',function(e){const b=e.target.closest('.sym-btn');if(b&&b.dataset.sym)insertSym(b.dataset.sym);},{passive:true});document.addEventListener('visibilitychange',()=>{const blobs=document.querySelectorAll('.aurora-blob,.scanline');blobs.forEach(el=>el.style.animationPlayState=document.hidden?'paused':'running');});</script></body></html>
