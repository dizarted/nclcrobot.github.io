ontent='–Э–∞–ґ–Љ–Є –љ–∞ –Ї–∞—А—В–Њ—З–Ї—Г вАФ —И—А–Є—Д—В –њ—А–Є–Љ–µ–љ–Є—В—Б—П –Ї —В–µ–Ї—Б—В—Г';list.appendChild(info);}const grid = document.createElement('div'); grid.className = 'font-grid';visible.forEach(f => {const i = f._i;const card = document.createElement('div');card.className = 'font-card' + (lastAppliedIdx === i ? ' applied' : '');card.dataset.idx = i;const nm = document.createElement('div'); nm.className = 'font-card-name'; nm.textContent = f.name;const pv = document.createElement('div'); pv.className = 'font-card-preview';pv.textContent = tryFont(f.fn, 'Sample Text');const uv = document.createElement('div'); uv.className = 'font-card-user';uv.textContent = src ? tryFont(f.fn, src) : '';const ap = document.createElement('div'); ap.className = 'font-card-apply';ap.textContent = lastAppliedIdx === i ? 'вЬУ –њ—А–Є–Љ–µ–љ—С–љ' : '–њ—А–Є–Љ–µ–љ–Є—В—М';card.appendChild(nm); card.appendChild(pv); card.appendChild(uv); card.appendChild(ap);card.onclick = () => applyFont(f.fn, i);grid.appendChild(card);});list.appendChild(grid);},50);}function updateFontPreviews(){if(currentSheet !== 'fonts') return;buildFonts();}function tryFont(fn,s){ try{ return fn(s); }catch(e){ return s; } }function applyFont(fn, idx){const ta = document.getElementById('txt');const source = rawText || ta.value;const s = ta.selectionStart, e = ta.selectionEnd;let converted;if(s !== e){const sel = ta.value.slice(s, e);converted = tryFont(fn, sel);ta.value = ta.value.slice(0, s) + converted + ta.value.slice(e);ta.selectionStart = s; ta.selectionEnd = s + converted.length;} else {converted = tryFont(fn, source);ta.value = converted;}lastAppliedIdx = idx;ta.focus();gen();document.querySelectorAll('.font-card').forEach((card) => {const ci = parseInt(card.dataset.idx);const isApplied = ci === idx;card.classList.toggle('applied', isApplied);const ap = card.querySelector('.font-card-apply');if(ap) ap.textContent = isApplied ? 'вЬУ –њ—А–Є–Љ–µ–љ—С–љ' : '–њ—А–Є–Љ–µ–љ–Є—В—М';const uv = card.querySelector('. tTransform:'uppercase',opacity:'0',pointerEvents:'none',transition:'all .3s cubic-bezier(.16,1,.3,1)',zIndex:'200',whiteSpace:'nowrap',boxShadow:'0 6px 24px rgba(37,99,235,.5)'});document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(14px)'},1800);}pick(0);document.getElementById('symList').addEventListener('click',function(e){const b=e.target.closest('.sym-btn');if(b&&b.dataset.sym)insertSym(b.dataset.sym);},{passive:true});document.addEventListener('visibilitychange',()=>{const blobs=document.querySelectorAll('.aurora-blob,.scanline');blobs.forEach(el=>el.style.animationPlayState=document.hidden?'paused':'running');});</script></body></html>
